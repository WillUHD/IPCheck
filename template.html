<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Check</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --text-muted: #666666;
      --border: #e1e1e1;
      --accent: #2563eb;
      --mono: ui-monospace, SFMono-Regular, SF Pro Text, Menlo, Monaco, Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --text-muted: #86868b;
        --border: #222222;
        --accent: #2997ff;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 40px 24px;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background-color: #34c759;
      border-radius: 50%;
    }

    h1 {
      font-family: var(--mono);
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
      word-break: break-all;
    }

    .list {
      display: flex;
      flex-direction: column;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .row:last-of-type {
      border-bottom: none;
    }

    .label {
      color: var(--text-muted);
    }

    .value {
      font-weight: 500;
      text-align: right;
    }

    .value-mono {
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge-status">
        <span class="badge-dot"></span>
        Region: {{country}}
      </div>
      <h1>{{ip}}</h1>
    </header>

    <div class="list">
      <div class="row">
        <span class="label">ISP Network</span>
        <span class="value">{{isp}}</span>
      </div>
      <div class="row">
        <span class="label">ASN</span>
        <span class="value value-mono">AS{{asn}}</span>
      </div>
      <div class="row">
        <span class="label">Location</span>
        <span class="value">{{city}}, {{region}}, {{country}}</span>
      </div>
      <div class="row">
        <span class="label">Timezone</span>
        <span class="value">{{timezone}}</span>
      </div>
      <div class="row">
        <span class="label">Edge Datacenter</span>
        <span class="value value-mono">{{colo}}</span>
      </div>
      <div class="row">
        <span class="label">Protocol</span>
        <span class="value value-mono">{{protocol}} ({{tlsVersion}})</span>
      </div>
      <div class="row">
        <span class="label">TCP Latency</span>
        <span class="value">{{rtt}}</span>
      </div>
    </div>

    <footer>
      <span>Ray ID: <span class="value-mono" style="opacity: 0.8;">{{rayId}}</span></span>
      <a href="?json">API Format</a>
    </footer>
  </div>
</body>
</html>
